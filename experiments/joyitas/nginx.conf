# ========================================
# Joyitas — Nginx Configuration for telar.store
# Host-level reverse proxy (installed directly on the server, NOT in Docker)
#
# Prerequisites:
#   sudo apt install -y nginx certbot python3-certbot-nginx
#
# To install:
#   sudo cp nginx.conf /etc/nginx/sites-available/joyitas
#   sudo ln -s /etc/nginx/sites-available/joyitas /etc/nginx/sites-enabled/joyitas
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain SSL certs (DNS A records must already point to server IP):
#
#   sudo certbot certonly --nginx \
#     -d telar.store \
#     -d www.telar.store \
#     -d api.telar.store
#
# After certbot, restore this clean config:
#   sudo cp nginx.conf /etc/nginx/sites-available/joyitas
#   sudo nginx -t && sudo systemctl reload nginx
# ========================================

# ----------------------------------------
# API (NestJS) — api.telar.store → :3040
# ----------------------------------------
server {
    listen 80;
    server_name api.telar.store;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name api.telar.store;

    ssl_certificate     /etc/letsencrypt/live/telar.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telar.store/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

# ----------------------------------------
# Marketplace Web (React) — telar.store + www.telar.store → :3001
# ----------------------------------------
server {
    listen 80;
    server_name telar.store www.telar.store;
    return 301 https://telar.store$request_uri;
}

server {
    listen 443 ssl;
    server_name www.telar.store;

    ssl_certificate     /etc/letsencrypt/live/telar.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telar.store/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Redirige www → sin www (canonical)
    return 301 https://telar.store$request_uri;
}

server {
    listen 443 ssl;
    server_name telar.store;

    ssl_certificate     /etc/letsencrypt/live/telar.store/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/telar.store/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
