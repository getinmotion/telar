version: '3.8'

services:
  # ========================================
  # API (NestJS) — api.telar.store → :3040
  # ========================================
  api:
    build:
      context: ../../
      dockerfile: experiments/joyitas/Dockerfile.api
    container_name: joyitas-api
    restart: unless-stopped
    ports:
      - "3040:3000"
    environment:
      # App Config
      NODE_ENV: production
      PORT: 3000

      # Database
      HOST_DB: ${HOST_DB}
      PORT_DB: ${PORT_DB}
      USER_DB: ${USER_DB}
      PASS_DB: ${PASS_DB}
      NAME_DB: ${NAME_DB}
      PASSWORD_SECRET: ${PASSWORD_SECRET}

      # SMTP Email
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      MAIL_FROM_EMAIL: ${MAIL_FROM_EMAIL}

      # Frontend URLs
      FRONTEND_URL: ${FRONTEND_URL}
      LOGO_URL: ${LOGO_URL}

      # AI
      OPENAI_API_KEY: ${OPENAI_API_KEY}

      # Google OAuth
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: ${GOOGLE_CALLBACK_URL}

      # Supabase Migration DB
      SUPABASE_DB_HOST: ${SUPABASE_DB_HOST}
      SUPABASE_DB_PORT: ${SUPABASE_DB_PORT}
      SUPABASE_DB_USER: ${SUPABASE_DB_USER}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      SUPABASE_DB_NAME: ${SUPABASE_DB_NAME}

      # CDN
      CDN_BASE_URL: ${CDN_BASE_URL}

      # Servientrega
      SERVIENTREGA_LOGIN: ${SERVIENTREGA_LOGIN}
      SERVIENTREGA_PASSWORD: ${SERVIENTREGA_PASSWORD}
      SERVIENTREGA_COD_FACTURACION: ${SERVIENTREGA_COD_FACTURACION}
      SERVIENTREGA_AUTH_URL: ${SERVIENTREGA_AUTH_URL}
      SERVIENTREGA_QUOTE_URL: ${SERVIENTREGA_QUOTE_URL}
      SERVIENTREGA_SOAP_URL: ${SERVIENTREGA_SOAP_URL}
      SERVIENTREGA_SOAP_ACTION_CARGUE: ${SERVIENTREGA_SOAP_ACTION_CARGUE}
      SERVIENTREGA_SOAP_ACTION_STICKER: ${SERVIENTREGA_SOAP_ACTION_STICKER}

      # Cobre
      COBRE_API_KEY: ${COBRE_API_KEY}
      COBRE_API_SECRET: ${COBRE_API_SECRET}
      COBRE_BALANCE_ID: ${COBRE_BALANCE_ID}
      COBRE_URL: ${COBRE_URL}

      # AWS S3
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_S3_BUCKET_NAME: ${AWS_S3_BUCKET_NAME}
      AWS_REGION: ${AWS_REGION}
      AWS_S3_ENDPOINT: ${AWS_S3_ENDPOINT}
      AWS_S3_ACL: ${AWS_S3_ACL}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE}

      # CMS & Agent
      CMS_KEY: ${CMS_KEY}
      AGENT_URL: ${AGENT_URL}

    networks:
      - joyitas-network

  # ========================================
  # Marketplace Web (React) — telar.store → :3001
  # ========================================
  marketplace-web:
    build:
      context: ../../
      dockerfile: experiments/joyitas/Dockerfile.marketplace-prebuilt
    container_name: joyitas-marketplace
    restart: unless-stopped
    ports:
      - "3001:80"
    networks:
      - joyitas-network

networks:
  joyitas-network:
    driver: bridge
