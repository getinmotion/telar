version: '3.8'

services:
  # ========================================
  # Marketplace Web (React) — cocrea.telar.co → :3002
  # ========================================
  marketplace-web:
    image: ghcr.io/getinmotion/gim-marketplace-web:${MARKETPLACE_IMAGE_TAG:-cocrea}
    container_name: cocrea-marketplace
    restart: unless-stopped
    ports:
      - "3002:80"
    environment:
      VITE_BACKEND_URL: ${VITE_BACKEND_URL}
      VITE_API_PAYMENT_URL: ${VITE_API_PAYMENT_URL}
      VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
      VITE_SUPABASE_PROJECT_ID: ${VITE_SUPABASE_PROJECT_ID}
      VITE_SUPABASE_PUBLISHABLE_KEY: ${VITE_SUPABASE_PUBLISHABLE_KEY}
      VITE_SEMANTIC_SEARCH_API_URL: ${VITE_SEMANTIC_SEARCH_API_URL}
      VITE_SEMANTIC_SEARCH_API_KEY: ${VITE_SEMANTIC_SEARCH_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - cocrea-network

networks:
  cocrea-network:
    driver: bridge
