# ========================================
# Cocrea — Nginx Configuration for cocrea.telar.co
# Host-level reverse proxy (installed directly on the server, NOT in Docker)
#
# Prerequisites:
#   sudo apt install -y nginx certbot python3-certbot-nginx
#
# To install:
#   sudo cp nginx.conf /etc/nginx/sites-available/cocrea
#   sudo ln -s /etc/nginx/sites-available/cocrea /etc/nginx/sites-enabled/cocrea
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain SSL certs (DNS A records must already point to server IP):
#
#   sudo certbot certonly --nginx \
#     -d cocrea.telar.co \
#     -d www.cocrea.telar.co
#
# After certbot, restore this clean config:
#   sudo cp nginx.conf /etc/nginx/sites-available/cocrea
#   sudo nginx -t && sudo systemctl reload nginx
# ========================================

# ----------------------------------------
# Marketplace Web (React) — cocrea.telar.co → :3002
# ----------------------------------------

# HTTP: cocrea.telar.co → HTTPS
server {
    listen 80;
    server_name cocrea.telar.co;
    return 301 https://$host$request_uri;
}

# HTTP: www.cocrea.telar.co → HTTPS
server {
    listen 80;
    server_name www.cocrea.telar.co;
    return 301 https://$host$request_uri;
}

# HTTPS: www.cocrea.telar.co → cocrea.telar.co (redirect www → sin www)
server {
    listen 443 ssl;
    server_name www.cocrea.telar.co;

    ssl_certificate     /etc/letsencrypt/live/cocrea.telar.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cocrea.telar.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://cocrea.telar.co$request_uri;
}

# HTTPS: cocrea.telar.co (canonical - sirve la aplicación)
server {
    listen 443 ssl;
    server_name cocrea.telar.co;

    ssl_certificate     /etc/letsencrypt/live/cocrea.telar.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cocrea.telar.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3002;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
