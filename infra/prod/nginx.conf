# ========================================
# GetInMotion — Production Nginx Configuration
# Host-level reverse proxy (installed directly on the server, NOT in Docker)
#
# Prerequisites:
#   sudo apt install -y nginx certbot python3-certbot-nginx
#
# To install:
#   sudo cp nginx.conf /etc/nginx/sites-available/telar
#   sudo ln -s /etc/nginx/sites-available/telar /etc/nginx/sites-enabled/telar
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Then obtain SSL certs (DNS A records must already point to 52.44.3.34):
#
# Certificate 1: API and internal services
#   sudo certbot certonly --nginx \
#     -d prod-api.telar.co \
#     -d app.telar.co \
#     -d moderation.telar.co \
#     -d prod-agents.telar.co \
#     -d prod-payment.telar.co
#
# Certificate 2: Public marketplace (separate cert for cleaner management)
#   sudo certbot certonly --nginx \
#     -d telar.co \
#     -d www.telar.co
#
# After certbot, restore this clean config:
#   sudo cp nginx.conf /etc/nginx/sites-available/telar
#   sudo nginx -t && sudo systemctl reload nginx
# ========================================

# ----------------------------------------
# API (NestJS) — prod-api.telar.co → :3040
# ----------------------------------------
server {
    listen 80;
    server_name prod-api.telar.co;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name prod-api.telar.co;

    ssl_certificate     /etc/letsencrypt/live/prod-api.telar.co/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/prod-api.telar.co/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass         http://127.0.0.1:3040;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}

